<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单备货查询系统</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>订单备货查询系统</h1>

    <!-- 文件上传区 -->
    <section class="card" id="upload-section">
      <h2>第一步：上传数据文件</h2>
      <div class="upload-row">
        <div class="upload-col">
          <div class="upload-box" id="order-upload-box">
            <input type="file" id="order-file" accept=".xlsx,.xls,.csv" />
            <label for="order-file">
              <span class="icon">📋</span>
              <span class="label">点击上传订单数据</span>
              <span class="hint">.xlsx / .xls / .csv</span>
            </label>
            <div class="file-status" id="order-status">未上传</div>
          </div>
          <div class="hist-box">
            <div class="hist-title">历史记录</div>
            <div id="order-history"></div>
          </div>
        </div>
        <div class="upload-col">
          <div class="upload-box" id="stock-upload-box">
            <input type="file" id="stock-file" accept=".xlsx,.xls,.csv" />
            <label for="stock-file">
              <span class="icon">📦</span>
              <span class="label">点击上传备货数据</span>
              <span class="hint">.xlsx / .xls / .csv</span>
            </label>
            <div class="file-status" id="stock-status">未上传</div>
          </div>
          <div class="hist-box">
            <div class="hist-title">历史记录</div>
            <div id="stock-history"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 查询区 -->
    <section class="card" id="query-section">
      <h2>第二步：查询条件 <span class="filter-tip">已自动筛选：下架状态「未下架&未改派」且改派标签「是」</span></h2>
      <div class="query-grid">
        <div class="field-group">
          <label>订单编号</label>
          <input type="text" id="q-order-id" placeholder="支持多个，逗号分隔" />
        </div>
        <div class="field-group">
          <label>产品ID</label>
          <input type="text" id="q-product-id" placeholder="支持多个，逗号分隔" />
        </div>
        <div class="field-group">
          <label>品名</label>
          <input type="text" id="q-product-name" placeholder="模糊匹配" />
        </div>
        <div class="field-group">
          <label>SKU</label>
          <input type="text" id="q-sku" placeholder="支持多个，逗号分隔" />
        </div>
        <div class="field-group">
          <label>国家/线路</label>
          <input type="text" id="q-country" placeholder="如：泰国、马来、菲律宾" />
        </div>
        <div class="field-group">
          <label>团队</label>
          <input type="text" id="q-team" placeholder="模糊匹配" />
        </div>
        <div class="field-group">
          <label>店铺</label>
          <input type="text" id="q-shop" placeholder="模糊匹配" />
        </div>
        <div class="field-group">
          <label>备货最新状态</label>
          <input type="text" id="q-status" placeholder="模糊匹配" />
        </div>
      </div>
      <div class="query-actions">
        <button id="btn-query" class="btn-primary" disabled>🔍 开始查询</button>
        <button id="btn-reset" class="btn-secondary">重置条件</button>
      </div>
    </section>

    <!-- 结果区 -->
    <section class="card" id="result-section" style="display:none">
      <div class="result-header">
        <h2>查询结果 <span id="result-count" class="badge">0</span></h2>
        <div class="export-actions">
          <button id="btn-col-setting" class="btn-export" onclick="openColPanel()">⚙ 列设置</button>
          <button id="btn-export-xlsx" class="btn-export">⬇ 导出 Excel</button>
          <button id="btn-export-csv" class="btn-export">⬇ 导出 CSV</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="result-table">
          <thead id="result-thead"></thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- 无结果提示 -->
    <div id="no-result" class="no-result" style="display:none">
      未找到匹配的记录，请调整查询条件后重试。
    </div>
  </div>

  <!-- 列设置面板 -->
  <div id="col-panel">
    <div id="col-panel-inner">
      <div class="col-panel-header">
        <span>列设置（拖拽排序 / 勾选显示）</span>
        <button onclick="closeColPanel()">✕</button>
      </div>
      <div id="col-panel-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
