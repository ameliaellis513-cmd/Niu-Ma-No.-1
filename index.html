<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单备货查询系统</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; padding: 24px 16px; }
.container { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; text-align: center; padding: 8px 0; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; font-weight: 600; color: #555; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
.filter-tip { font-size: 12px; font-weight: 400; color: #fff; background: #52c41a; border-radius: 4px; padding: 2px 10px; }
.upload-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.upload-col { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 10px; }
.upload-box { border: 2px dashed #d0d7de; border-radius: 10px; padding: 28px 20px; text-align: center; transition: border-color 0.2s, background 0.2s; position: relative; }
.upload-box:hover { border-color: #4f8ef7; background: #f7f9ff; }
.upload-box.loaded { border-color: #52c41a; background: #f6ffed; }
.upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-box label { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
.upload-box .icon { font-size: 32px; }
.upload-box .label { font-size: 15px; font-weight: 600; color: #333; }
.upload-box .hint { font-size: 12px; color: #999; }
.file-status { margin-top: 10px; font-size: 13px; color: #999; font-weight: 500; }
.upload-box.loaded .file-status { color: #52c41a; }
.query-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-group label { font-size: 13px; color: #666; font-weight: 500; }
.field-group input { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.field-group input:focus { border-color: #4f8ef7; }
.query-actions { display: flex; gap: 10px; }
.btn-primary { padding: 9px 28px; background: #4f8ef7; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, opacity 0.2s; }
.btn-primary:hover:not(:disabled) { background: #2d6fe0; }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-secondary { padding: 9px 20px; background: #f5f5f5; color: #555; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
.btn-secondary:hover { background: #e8e8e8; }
.result-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
.result-header h2 { border: none; margin: 0; padding: 0; }
.badge { display: inline-block; background: #4f8ef7; color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 13px; margin-left: 8px; }
.export-actions { display: flex; gap: 8px; }
.btn-export { padding: 7px 16px; background: #fff; color: #4f8ef7; border: 1px solid #4f8ef7; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.2s, color 0.2s; }
.btn-export:hover { background: #4f8ef7; color: #fff; }
.table-wrap { max-height: 520px; overflow: auto; border-radius: 8px; border: 1px solid #f0f0f0; }
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; table-layout: fixed; }
thead th { background: #fafafa; padding: 10px 14px; text-align: left; font-weight: 600; color: #555; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 2; }
tbody tr:hover { background: #f7f9ff; }
tbody td { padding: 9px 14px; border-bottom: 1px solid #f5f5f5; color: #333; overflow: hidden; text-overflow: ellipsis; vertical-align: top; }
.tag-country { display: inline-block; background: #e6f4ff; color: #1677ff; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-status { display: inline-block; background: #fff7e6; color: #d46b08; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-warn { display: inline-block; background: #fff2e8; color: #d4380d; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-ok { display: inline-block; background: #f6ffed; color: #389e0d; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-none { display: inline-block; background: #f0f0f0; color: #595959; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.no-result { text-align: center; padding: 40px; color: #999; font-size: 15px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
#col-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1000; align-items: flex-start; justify-content: flex-end; padding: 80px 24px 0 0; }
#col-panel-inner { background: #fff; border-radius: 10px; width: 300px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden; }
.col-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
.col-panel-header button { background: none; border: none; font-size: 16px; cursor: pointer; color: #999; }
#col-panel-list { overflow-y: auto; padding: 8px 0; }
.col-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: grab; user-select: none; font-size: 13px; transition: background 0.15s; }
.col-item:hover { background: #f7f9ff; }
.col-item.dragging { opacity: 0.4; }
.col-item.drag-over { background: #e6f4ff; border-top: 2px solid #4f8ef7; }
.drag-handle { color: #bbb; font-size: 16px; cursor: grab; }
.col-label { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-width-input { width: 52px; padding: 3px 5px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 12px; text-align: right; outline: none; flex-shrink: 0; }
.col-width-input:focus { border-color: #4f8ef7; }
.col-width-unit { font-size: 11px; color: #aaa; flex-shrink: 0; }
.th-inner { display: flex; align-items: center; justify-content: space-between; gap: 4px; overflow: hidden; }
.col-resizer { width: 5px; min-width: 5px; height: 18px; cursor: col-resize; background: transparent; border-right: 2px solid #d0d7de; border-radius: 1px; flex-shrink: 0; transition: border-color 0.15s; }
.col-resizer:hover, .col-resizer:active { border-color: #4f8ef7; }
.hist-box { border: 1px solid #f0f0f0; border-radius: 8px; overflow: hidden; }
.hist-title { font-size: 12px; font-weight: 600; color: #888; padding: 7px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
.hist-item { display: flex; align-items: center; padding: 7px 10px; border-bottom: 1px solid #f9f9f9; gap: 8px; }
.hist-item:last-child { border-bottom: none; }
.hist-info { flex: 1; cursor: pointer; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.hist-info:hover .hist-name { color: #4f8ef7; }
.hist-name { font-size: 13px; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }
.hist-meta { font-size: 11px; color: #aaa; }
.hist-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
.hist-del:hover { color: #ff4d4f; background: #fff1f0; }
.hist-empty { font-size: 12px; color: #ccc; padding: 10px 12px; }
.filter-btn { background: none; border: 1px solid transparent; border-radius: 3px; font-size: 10px; color: #aaa; cursor: pointer; padding: 1px 4px; flex-shrink: 0; line-height: 1; transition: color 0.15s, border-color 0.15s; }
.filter-btn:hover { color: #4f8ef7; border-color: #4f8ef7; }
.filter-btn.filter-active { color: #4f8ef7; border-color: #4f8ef7; background: #e6f4ff; }
.filter-dropdown { position: absolute; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.13); z-index: 3000; min-width: 200px; max-width: 320px; padding: 8px 0 4px; display: flex; flex-direction: column; }
.filter-dd-search { margin: 0 10px 6px; padding: 5px 8px; border: 1px solid #d9d9d9; border-radius: 5px; font-size: 13px; outline: none; }
.filter-dd-search:focus { border-color: #4f8ef7; }
.filter-dd-items { max-height: 240px; overflow-y: auto; }
.filter-dd-item { display: flex; align-items: center; gap: 7px; padding: 5px 12px; font-size: 13px; cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.filter-dd-item:hover { background: #f5f7ff; }
.filter-dd-item input[type="checkbox"] { flex-shrink: 0; cursor: pointer; }
.logic-switch-bar { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 10px; padding: 12px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.logic-label { font-size: 14px; color: #555; font-weight: 500; }
.logic-btn { padding: 6px 20px; border: 1px solid #d9d9d9; border-radius: 6px; background: #f5f5f5; color: #555; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.logic-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }
.logic-btn.logic-active { background: #4f8ef7; color: #fff; border-color: #4f8ef7; font-weight: 600; }
.logic-desc { font-size: 12px; color: #999; margin-left: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>订单备货查询系统</h1>
    <div class="logic-switch-bar">
      <span class="logic-label">当前匹配逻辑：</span>
      <button id="btn-logic1" class="logic-btn logic-active" onclick="switchLogic(1)">匹配逻辑1</button>
      <button id="btn-logic2" class="logic-btn" onclick="switchLogic(2)">匹配逻辑2</button>
      <span id="logic-desc" class="logic-desc">旧版备货表头</span>
    </div>
    <section class="card" id="upload-section">
      <h2>第一步：上传数据文件</h2>
      <div class="upload-row">
        <div class="upload-col">
          <div class="upload-box" id="order-upload-box">
            <input type="file" id="order-file" accept=".xlsx,.xls,.csv" />
            <label for="order-file"><span class="icon">📃</span><span class="label">点击上传订单数据</span><span class="hint">.xlsx / .xls / .csv</span></label>
            <div class="file-status" id="order-status">未上传</div>
          </div>
          <div class="hist-box"><div class="hist-title">历史记录</div><div id="order-history"></div></div>
        </div>
        <div class="upload-col">
          <div class="upload-box" id="stock-upload-box">
            <input type="file" id="stock-file" accept=".xlsx,.xls,.csv" />
            <label for="stock-file"><span class="icon">📦</span><span class="label">点击上传备货数据</span><span class="hint">.xlsx / .xls / .csv</span></label>
            <div class="file-status" id="stock-status">未上传</div>
          </div>
          <div class="hist-box"><div class="hist-title">历史记录</div><div id="stock-history"></div></div>
        </div>
      </div>
    </section>
    <section class="card" id="query-section">
      <h2>第二步：查询条件 <span class="filter-tip">已自动筛选：下架状态「未下架&未改派」且改派标签「是」</span></h2>
      <div class="query-grid">
        <div class="field-group"><label>订单编号</label><input type="text" id="q-order-id" placeholder="支持多个，逗号分隔" /></div>
        <div class="field-group"><label>产品ID</label><input type="text" id="q-product-id" placeholder="支持多个，逗号分隔" /></div>
        <div class="field-group"><label>品名</label><input type="text" id="q-product-name" placeholder="模糊匹配" /></div>
        <div class="field-group"><label>SKU</label><input type="text" id="q-sku" placeholder="支持多个，逗号分隔" /></div>
        <div class="field-group"><label>国家/线路</label><input type="text" id="q-country" placeholder="如：泰国、马来、菲律宾" /></div>
        <div class="field-group"><label>团队</label><input type="text" id="q-team" placeholder="模糊匹配" /></div>
        <div class="field-group"><label>店铺</label><input type="text" id="q-shop" placeholder="模糊匹配" /></div>
        <div class="field-group logic1-only"><label>备货最新状态</label><input type="text" id="q-status" placeholder="模糊匹配" /></div>
      </div>
      <div class="query-actions">
        <button id="btn-query" class="btn-primary" disabled>🔍 开始查询</button>
        <button id="btn-reset" class="btn-secondary">重置条件</button>
      </div>
    </section>
    <section class="card" id="result-section" style="display:none">
      <div class="result-header">
        <h2>查询结果 <span id="result-count" class="badge">0</span></h2>
        <div class="export-actions">
          <button class="btn-export" onclick="openColPanel()">⚙ 列设置</button>
          <button id="btn-export-xlsx" class="btn-export">⬇ 导出 Excel</button>
          <button id="btn-export-csv" class="btn-export">⬇ 导出 CSV</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="result-table"><thead id="result-thead"></thead><tbody id="result-tbody"></tbody></table>
      </div>
    </section>
    <div id="no-result" class="no-result" style="display:none">未找到匹配的记录，请调整查询条件后重试。</div>
  </div>
  <div id="col-panel">
    <div id="col-panel-inner">
      <div class="col-panel-header"><span>列设置（拖拽排序 / 勾选显示）</span><button onclick="closeColPanel()">✕</button></div>
      <div id="col-panel-list"></div>
    </div>
  </div>
  <script>
const COUNTRY_KEYWORDS=[{keywords:['菲律宾','菲律'],country:'菲律宾'},{keywords:['马来西亚','马来'],country:'马来西亚'},{keywords:['泰国','Lazada改派Flash','lazada改派flash'],country:'泰国'},{keywords:['印尼','印度尼西亚'],country:'印度尼西亚'},{keywords:['越南'],country:'越南'},{keywords:['新加坡'],country:'新加坡'},{keywords:['美国','US','FBA-US'],country:'美国'},{keywords:['英国','UK','FBA-UK'],country:'英国'},{keywords:['德国','DE','FBA-DE'],country:'德国'},{keywords:['日本','JP','FBA-JP'],country:'日本'},{keywords:['澳大利亚','澳洲'],country:'澳大利亚'},{keywords:['法国','FR'],country:'法国'},{keywords:['西班牙','ES'],country:'西班牙'},{keywords:['意大利','IT'],country:'意大利'},{keywords:['加拿大','CA'],country:'加拿大'}];
function detectCountry(channel){if(!channel)return'';for(const{keywords,country}of COUNTRY_KEYWORDS)for(const kw of keywords)if(channel.includes(kw))return country;return channel;}
let orderData=[],stockData=[];
let currentLogic=parseInt(localStorage.getItem('current_logic')??'1');
function switchLogic(n){
  currentLogic=n;localStorage.setItem('current_logic',n);
  document.getElementById('btn-logic1').classList.toggle('logic-active',n===1);
  document.getElementById('btn-logic2').classList.toggle('logic-active',n===2);
  document.getElementById('logic-desc').textContent=n===1?'旧版备货表头':'新版备货表头';
  document.querySelectorAll('.logic1-only').forEach(el=>el.style.display=n===1?'':'none');
  document.getElementById('result-section').style.display='none';
  document.getElementById('no-result').style.display='none';
  const cols=n===1?RESULT_COLS_L1:RESULT_COLS_L2;
  colOrder=[...cols];colVisible=Object.fromEntries(cols.map(c=>[c,true]));colWidths=Object.fromEntries(cols.map(c=>[c,120]));
  loadColSettings();renderHistory('stock');
}
const RESULT_COLS_L1=['订单编号','下架状态','改派标签','产品ID','品名','SKU','规格','物流渠道','识别国家','团队','店铺','支付时间','理论到货时间','申请批次号','备货线路','备货SKU','备货SKU名称','SKU匹配','备货申请数量','采购数量','批次状态','最新状态','运输方式','供应商','目标仓库','添加时间','提交采购时间'];
const RESULT_COLS_L2=['订单编号','下架状态','改派标签','产品ID','品名','SKU','规格','物流渠道','识别国家','团队','店铺','支付时间','理论到货时间','SKU匹配','批次号','备货线路','备货SKU','备货SKU名称','装箱数量','运输方式','提货时间距今时间间隔','备货情况'];
function readExcel(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}));}catch(err){reject(err);}};reader.onerror=reject;reader.readAsArrayBuffer(file);});}
function normalize(val){return String(val??'').trim().toLowerCase();}
function multiMatch(input,fieldVal){if(!input.trim())return true;return input.split(/[,，\s]+/).map(s=>s.trim().toLowerCase()).filter(Boolean).some(t=>normalize(fieldVal).includes(t));}
function fuzzyMatch(input,fieldVal){if(!input.trim())return true;return normalize(fieldVal).includes(normalize(input));}
const HISTORY_KEY_ORDER='history_order',HISTORY_KEY_STOCK='history_stock',HISTORY_KEY_STOCK2='history_stock2',MAX_HISTORY=10;
function getStockKey(){return currentLogic===2?HISTORY_KEY_STOCK2:HISTORY_KEY_STOCK;}
function saveHistory(target,fileName,rows){
  const key=target==='order'?HISTORY_KEY_ORDER:getStockKey();
  let list=getHistory(target).filter(h=>h.fileName!==fileName);
  list.unshift({fileName,rows,savedAt:new Date().toLocaleString()});
  if(list.length>MAX_HISTORY)list=list.slice(0,MAX_HISTORY);
  while(list.length>0){try{localStorage.setItem(key,JSON.stringify(list));break;}catch(e){list=list.slice(0,Math.max(1,list.length-1));if(list.length===1){try{localStorage.setItem(key,JSON.stringify(list));}catch(_){localStorage.removeItem(key);}break;}}}
  renderHistory(target);
}
function getHistory(target){try{return JSON.parse(localStorage.getItem(target==='order'?HISTORY_KEY_ORDER:getStockKey())??'[]');}catch{return[];}}
function loadFromHistory(target,idx){const item=getHistory(target)[idx];if(!item)return;if(target==='order'){orderData=item.rows;document.getElementById('order-status').textContent=`✓ ${item.fileName}（${item.rows.length} 行）`;document.getElementById('order-upload-box').classList.add('loaded');}else{stockData=item.rows;document.getElementById('stock-status').textContent=`✓ ${item.fileName}（${item.rows.length} 行）`;document.getElementById('stock-upload-box').classList.add('loaded');}checkReady();}
function deleteHistory(target,idx){const key=target==='order'?HISTORY_KEY_ORDER:getStockKey();const list=getHistory(target);list.splice(idx,1);localStorage.setItem(key,JSON.stringify(list));renderHistory(target);}
function renderHistory(target){const list=getHistory(target),el=document.getElementById(`${target}-history`);if(!list.length){el.innerHTML='<div class="hist-empty">暂无历史记录</div>';return;}el.innerHTML=list.map((h,i)=>`<div class="hist-item"><div class="hist-info" onclick="loadFromHistory('${target}',${i})" title="点击加载"><span class="hist-name">${h.fileName}</span><span class="hist-meta">${h.rows.length} 行 · ${h.savedAt}</span></div><button class="hist-del" onclick="deleteHistory('${target}',${i})" title="删除">✕</button></div>`).join('');}
async function handleFileUpload(inputId,statusId,boxId,target){const input=document.getElementById(inputId),file=input.files[0];if(!file)return;const statusEl=document.getElementById(statusId),boxEl=document.getElementById(boxId);statusEl.textContent='解析中...';try{const rows=await readExcel(file);if(target==='order')orderData=rows;else stockData=rows;statusEl.textContent=`✓ ${file.name}（${rows.length} 行）`;boxEl.classList.add('loaded');saveHistory(target,file.name,rows);checkReady();}catch(e){statusEl.textContent='解析失败，请检查文件格式';console.error(e);}}
function checkReady(){document.getElementById('btn-query').disabled=!(orderData.length>0&&stockData.length>0);}
function doQuery(){if(currentLogic===2){doQueryL2();return;}
  const qOrderId=document.getElementById('q-order-id').value,qProductId=document.getElementById('q-product-id').value,qProductName=document.getElementById('q-product-name').value,qSku=document.getElementById('q-sku').value,qCountry=document.getElementById('q-country').value.trim().toLowerCase(),qTeam=document.getElementById('q-team').value,qShop=document.getElementById('q-shop').value,qStatus=document.getElementById('q-status').value;
  const filteredOrders=orderData.filter(row=>{if(normalize(row['下架状态']??'')!=='未下架&未改派')return false;if(normalize(row['改派标签']??'')!=='是')return false;if(!multiMatch(qOrderId,row['订单编号']))return false;if(!multiMatch(qProductId,row['产品ID']))return false;if(!fuzzyMatch(qProductName,row['品名']))return false;if(!multiMatch(qSku,row['SKU']))return false;if(!fuzzyMatch(qTeam,row['团队']))return false;if(!fuzzyMatch(qShop,row['店铺']))return false;if(qCountry&&!normalize(detectCountry(row['物流渠道'])).includes(qCountry))return false;return true;});
  const results=[];
