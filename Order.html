<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单备货查询系统</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; padding: 24px 16px; }
.container { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; text-align: center; padding: 8px 0; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; font-weight: 600; color: #555; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
.filter-tip { font-size: 12px; font-weight: 400; color: #fff; background: #52c41a; border-radius: 4px; padding: 2px 10px; }
.upload-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.upload-col { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 10px; }
.upload-box { flex: 1; min-width: 240px; border: 2px dashed #d0d7de; border-radius: 10px; padding: 28px 20px; text-align: center; transition: border-color 0.2s, background 0.2s; position: relative; }
.upload-box:hover { border-color: #4f8ef7; background: #f7f9ff; }
.upload-box.loaded { border-color: #52c41a; background: #f6ffed; }
.upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-box label { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
.upload-box .icon { font-size: 32px; }
.upload-box .label { font-size: 15px; font-weight: 600; color: #333; }
.upload-box .hint { font-size: 12px; color: #999; }
.file-status { margin-top: 10px; font-size: 13px; color: #999; font-weight: 500; }
.upload-box.loaded .file-status { color: #52c41a; }
.query-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-group label { font-size: 13px; color: #666; font-weight: 500; }
.field-group input { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
.field-group input:focus { border-color: #4f8ef7; }
.query-actions { display: flex; gap: 10px; }
.btn-primary { padding: 9px 28px; background: #4f8ef7; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, opacity 0.2s; }
.btn-primary:hover:not(:disabled) { background: #2d6fe0; }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-secondary { padding: 9px 20px; background: #f5f5f5; color: #555; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
.btn-secondary:hover { background: #e8e8e8; }
.result-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
.result-header h2 { border: none; margin: 0; padding: 0; }
.badge { display: inline-block; background: #4f8ef7; color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 13px; margin-left: 8px; }
.export-actions { display: flex; gap: 8px; }
.btn-export { padding: 7px 16px; background: #fff; color: #4f8ef7; border: 1px solid #4f8ef7; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.2s, color 0.2s; }
.btn-export:hover { background: #4f8ef7; color: #fff; }
.table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #f0f0f0; max-height: 520px; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; table-layout: fixed; }
thead th { background: #fafafa; padding: 10px 14px; text-align: left; font-weight: 600; color: #555; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 2; }
thead .filter-row th { top: 37px; padding: 4px 6px; background: #f5f7fa; }
tbody tr:hover { background: #f7f9ff; }
tbody td { padding: 9px 14px; border-bottom: 1px solid #f5f5f5; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: pre-line; vertical-align: top; }
.tag-country { display: inline-block; background: #e6f4ff; color: #1677ff; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-status { display: inline-block; background: #fff7e6; color: #d46b08; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-warn { display: inline-block; background: #fff2e8; color: #d4380d; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.tag-ok { display: inline-block; background: #f6ffed; color: #389e0d; border-radius: 4px; padding: 1px 8px; font-size: 12px; font-weight: 600; }
.no-result { text-align: center; padding: 40px; color: #999; font-size: 15px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
#col-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1000; align-items: flex-start; justify-content: flex-end; padding: 80px 24px 0 0; }
#col-panel-inner { background: #fff; border-radius: 10px; width: 300px; max-height: 70vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden; }
.col-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
.col-panel-header button { background: none; border: none; font-size: 16px; cursor: pointer; color: #999; }
#col-panel-list { overflow-y: auto; padding: 8px 0; }
.col-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: grab; user-select: none; font-size: 13px; transition: background 0.15s; }
.col-item:hover { background: #f7f9ff; }
.col-item.dragging { opacity: 0.4; }
.col-item.drag-over { background: #e6f4ff; border-top: 2px solid #4f8ef7; }
.drag-handle { color: #bbb; font-size: 16px; cursor: grab; }
.col-label { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-filter { width: 100%; padding: 4px 6px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 12px; outline: none; box-sizing: border-box; }
.col-filter:focus { border-color: #4f8ef7; }
.col-width-input { width: 52px; padding: 3px 5px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 12px; text-align: right; outline: none; flex-shrink: 0; }
.col-width-input:focus { border-color: #4f8ef7; }
.col-width-unit { font-size: 11px; color: #aaa; flex-shrink: 0; }
.th-inner { display: flex; align-items: center; justify-content: space-between; gap: 4px; overflow: hidden; }
.col-resizer { width: 5px; min-width: 5px; height: 18px; cursor: col-resize; background: transparent; border-right: 2px solid #d0d7de; border-radius: 1px; flex-shrink: 0; transition: border-color 0.15s; }
.col-resizer:hover, .col-resizer:active { border-color: #4f8ef7; }
.hist-box { border: 1px solid #f0f0f0; border-radius: 8px; overflow: hidden; }
.hist-title { font-size: 12px; font-weight: 600; color: #888; padding: 7px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
.hist-item { display: flex; align-items: center; padding: 7px 10px; border-bottom: 1px solid #f9f9f9; gap: 8px; }
.hist-item:last-child { border-bottom: none; }
.hist-info { flex: 1; cursor: pointer; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.hist-info:hover .hist-name { color: #4f8ef7; }
.hist-name { font-size: 13px; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }
.hist-meta { font-size: 11px; color: #aaa; }
.hist-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
.hist-del:hover { color: #ff4d4f; background: #fff1f0; }
.hist-empty { font-size: 12px; color: #ccc; padding: 10px 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>订单备货查询系统</h1>
    <section class="card" id="upload-section">
      <h2>第一步：上传数据文件</h2>
      <div class="upload-row">
        <div class="upload-col">
          <div class="upload-box" id="order-upload-box">
            <input type="file" id="order-file" accept=".xlsx,.xls,.csv" />
            <label for="order-file">
              <span class="icon">📋</span>
              <span class="label">点击上传订单数据</span>
              <span class="hint">.xlsx / .xls / .csv</span>
            </label>
            <div class="file-status" id="order-status">未上传</div>
          </div>
          <div class="hist-box"><div class="hist-title">历史记录</div><div id="order-history"></div></div>
        </div>
        <div class="upload-col">
          <div class="upload-box" id="stock-upload-box">
            <input type="file" id="stock-file" accept=".xlsx,.xls,.csv" />
            <label for="stock-file">
              <span class="icon">📦</span>
              <span class="label">点击上传备货数据</span>
              <span class="hint">.xlsx / .xls / .csv</span>
            </label>
            <div class="file-status" id="stock-status">未上传</div>
          </div>
          <div class="hist-box"><div class="hist-title">历史记录</div><div id="stock-history"></div></div>
        </div>
      </div>
    </section>
    <section class="card" id="query-section">
      <h2>第二步：查询条件 <span class="filter-tip">已自动筛选：下架状态「未下架&未改派」且改派标签「是」</span></h2>
      <div class="query-grid">
        <div class="field-group"><label>订单编号</label><input type="text" id="q-order-id" placeholder="支持多个，逗号分隔" /></div>
        <div class="field-group"><label>产品ID</label><input type="text" id="q-product-id" placeholder="支持多个，逗号分隔" /></div>
        <div class="field-group"><label>品名</label><input type="text" id="q-product-name" placeholder="模糊匹配" /></div>
        <div class="field-group"><label>SKU</label><input type="text" id="q-sku" placeholder="支持多个，逗号分隔" /></div>
        <div class="field-group"><label>国家/线路</label><input type="text" id="q-country" placeholder="如：泰国、马来、菲律宾" /></div>
        <div class="field-group"><label>团队</label><input type="text" id="q-team" placeholder="模糊匹配" /></div>
        <div class="field-group"><label>店铺</label><input type="text" id="q-shop" placeholder="模糊匹配" /></div>
        <div class="field-group"><label>备货最新状态</label><input type="text" id="q-status" placeholder="模糊匹配" /></div>
      </div>
      <div class="query-actions">
        <button id="btn-query" class="btn-primary" disabled>🔍 开始查询</button>
        <button id="btn-reset" class="btn-secondary">重置条件</button>
      </div>
    </section>
    <section class="card" id="result-section" style="display:none">
      <div class="result-header">
        <h2>查询结果 <span id="result-count" class="badge">0</span></h2>
        <div class="export-actions">
          <button class="btn-export" onclick="openColPanel()">⚙ 列设置</button>
          <button id="btn-export-xlsx" class="btn-export">⬇ 导出 Excel</button>
          <button id="btn-export-csv" class="btn-export">⬇ 导出 CSV</button>
        </div>
      </div>
      <div class="table-wrap">
        <table id="result-table"><thead id="result-thead"></thead><tbody id="result-tbody"></tbody></table>
      </div>
    </section>
    <div id="no-result" class="no-result" style="display:none">未找到匹配的记录，请调整查询条件后重试。</div>
  </div>
  <div id="col-panel">
    <div id="col-panel-inner">
      <div class="col-panel-header">
        <span>列设置（拖拽排序 / 勾选显示）</span>
        <button onclick="closeColPanel()">✕</button>
      </div>
      <div id="col-panel-list"></div>
    </div>
  </div>
  <script>
const COUNTRY_KEYWORDS = [
  { keywords: ['菲律宾', '菲律'], country: '菲律宾' },
  { keywords: ['马来西亚', '马来'], country: '马来西亚' },
  { keywords: ['泰国', 'Lazada改派Flash', 'lazada改派flash'], country: '泰国' },
  { keywords: ['印尼', '印度尼西亚'], country: '印度尼西亚' },
  { keywords: ['越南'], country: '越南' },
  { keywords: ['新加坡'], country: '新加坡' },
  { keywords: ['美国', 'US', 'FBA-US'], country: '美国' },
  { keywords: ['英国', 'UK', 'FBA-UK'], country: '英国' },
  { keywords: ['德国', 'DE', 'FBA-DE'], country: '德国' },
  { keywords: ['日本', 'JP', 'FBA-JP'], country: '日本' },
  { keywords: ['澳大利亚', '澳洲'], country: '澳大利亚' },
  { keywords: ['法国', 'FR'], country: '法国' },
  { keywords: ['西班牙', 'ES'], country: '西班牙' },
  { keywords: ['意大利', 'IT'], country: '意大利' },
  { keywords: ['加拿大', 'CA'], country: '加拿大' },
];
function detectCountry(channel) {
  if (!channel) return '';
  for (const { keywords, country } of COUNTRY_KEYWORDS) {
    for (const kw of keywords) { if (channel.includes(kw)) return country; }
  }
  return channel;
}
let orderData = [], stockData = [];
function readExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws, { defval: '' }));
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}
function normalize(val) { return String(val ?? '').trim().toLowerCase(); }
function multiMatch(input, fieldVal) {
  if (!input.trim()) return true;
  const terms = input.split(/[,，\s]+/).map(s => s.trim().toLowerCase()).filter(Boolean);
  return terms.some(t => normalize(fieldVal).includes(t));
}
function fuzzyMatch(input, fieldVal) {
  if (!input.trim()) return true;
  return normalize(fieldVal).includes(normalize(input));
}
const HISTORY_KEY_ORDER = 'history_order', HISTORY_KEY_STOCK = 'history_stock', MAX_HISTORY = 10;
function saveHistory(target, fileName, rows) {
  const key = target === 'order' ? HISTORY_KEY_ORDER : HISTORY_KEY_STOCK;
  let list = getHistory(target).filter(h => h.fileName !== fileName);
  list.unshift({ fileName, rows, savedAt: new Date().toLocaleString() });
  if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
  try { localStorage.setItem(key, JSON.stringify(list)); }
  catch(e) { list = list.slice(0, 3); try { localStorage.setItem(key, JSON.stringify(list)); } catch(_) {} }
  renderHistory(target);
}
function getHistory(target) {
  const key = target === 'order' ? HISTORY_KEY_ORDER : HISTORY_KEY_STOCK;
  try { return JSON.parse(localStorage.getItem(key) ?? '[]'); } catch { return []; }
}
function loadFromHistory(target, idx) {
  const item = getHistory(target)[idx];
  if (!item) return;
  if (target === 'order') { orderData = item.rows; document.getElementById('order-status').textContent = `✓ ${item.fileName}（${item.rows.length} 行）`; document.getElementById('order-upload-box').classList.add('loaded'); }
  else { stockData = item.rows; document.getElementById('stock-status').textContent = `✓ ${item.fileName}（${item.rows.length} 行）`; document.getElementById('stock-upload-box').classList.add('loaded'); }
  checkReady();
}
function deleteHistory(target, idx) {
  const key = target === 'order' ? HISTORY_KEY_ORDER : HISTORY_KEY_STOCK;
  const list = getHistory(target); list.splice(idx, 1);
  localStorage.setItem(key, JSON.stringify(list)); renderHistory(target);
}
function renderHistory(target) {
  const list = getHistory(target), el = document.getElementById(`${target}-history`);
  if (!list.length) { el.innerHTML = '<div class="hist-empty">暂无历史记录</div>'; return; }
  el.innerHTML = list.map((h, i) => `<div class="hist-item"><div class="hist-info" onclick="loadFromHistory('${target}',${i})" title="点击加载"><span class="hist-name">${h.fileName}</span><span class="hist-meta">${h.rows.length} 行 · ${h.savedAt}</span></div><button class="hist-del" onclick="deleteHistory('${target}',${i})" title="删除">✕</button></div>`).join('');
}
async function handleFileUpload(inputId, statusId, boxId, target) {
  const input = document.getElementById(inputId), file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById(statusId), boxEl = document.getElementById(boxId);
  statusEl.textContent = '解析中...';
  try {
    const rows = await readExcel(file);
    if (target === 'order') orderData = rows; else stockData = rows;
    statusEl.textContent = `✓ ${file.name}（${rows.length} 行）`;
    boxEl.classList.add('loaded'); saveHistory(target, file.name, rows); checkReady();
  } catch (e) { statusEl.textContent = '解析失败，请检查文件格式'; console.error(e); }
}
function checkReady() { document.getElementById('btn-query').disabled = !(orderData.length > 0 && stockData.length > 0); }
function doQuery() {
  const qOrderId=document.getElementById('q-order-id').value, qProductId=document.getElementById('q-product-id').value,
    qProductName=document.getElementById('q-product-name').value, qSku=document.getElementById('q-sku').value,
    qCountry=document.getElementById('q-country').value.trim().toLowerCase(), qTeam=document.getElementById('q-team').value,
    qShop=document.getElementById('q-shop').value, qStatus=document.getElementById('q-status').value;
  const filteredOrders = orderData.filter(row => {
    if (normalize(row['下架状态']??'') !== '未下架&未改派') return false;
    if (normalize(row['改派标签']??'') !== '是') return false;
    if (!multiMatch(qOrderId, row['订单编号'])) return false;
    if (!multiMatch(qProductId, row['产品ID'])) return false;
    if (!fuzzyMatch(qProductName, row['品名'])) return false;
    if (!multiMatch(qSku, row['SKU'])) return false;
    if (!fuzzyMatch(qTeam, row['团队'])) return false;
    if (!fuzzyMatch(qShop, row['店铺'])) return false;
    if (qCountry && !normalize(detectCountry(row['物流渠道'])).includes(qCountry)) return false;
    return true;
  });
  const results = [];
  for (const order of filteredOrders) {
    const pid = normalize(order['产品ID']), country = detectCountry(order['物流渠道']), countryNorm = normalize(country);
    const matchedStock = stockData.filter(s => {
      if (normalize(s['产品ID']) !== pid) return false;
      const sLine = normalize(s['线路']??'');
      if (!sLine.includes(countryNorm) && !countryNorm.includes(sLine)) return false;
      if (!fuzzyMatch(qStatus, s['最新状态'])) return false;
      return true;
    });
    if (matchedStock.length === 0) {
      results.push(buildRow(order, null, country));
    } else {
      const orderSkuRaw = normalize(order['SKU']??'');
      const orderSku = orderSkuRaw.includes(':') ? orderSkuRaw.split(':')[0].trim() : orderSkuRaw;
      const exactMatch = matchedStock.filter(s => normalize(s['sku']??s['SKU']??'') === orderSku);
      const toShow = exactMatch.length > 0 ? exactMatch : matchedStock;
      toShow.forEach(s => results.push(buildRow(order, s, country)));
    }
  }
  renderResults(results);
}
function buildRow(order, stock, country) {
  return {
    '订单编号': order['订单编号']??'', '下架状态': order['下架状态']??'', '改派标签': order['改派标签']??'',
    '产品ID': order['产品ID']??'', '品名': order['品名']??'', 'SKU': order['SKU']??'', '规格': order['规格']??'',
    '物流渠道': order['物流渠道']??'', '识别国家': country, '团队': order['团队']??'', '店铺': order['店铺']??'',
    '支付时间': order['支付时间']??'', '理论到货时间': order['理论到货时间']??'',
    '申请批次号': stock?.['申请批次号']??'—', '备货线路': stock?.['线路']??'—',
    '备货SKU': stock?.['sku']??stock?.['SKU']??'—', '备货SKU名称': stock?.['SKU名称']??'—',
    'SKU匹配': !stock?'—':(()=>{const raw=normalize(order['SKU']??'');const oSku=raw.includes(':')?raw.split(':')[0].trim():raw;const sSku=normalize(stock?.['sku']??stock?.['SKU']??'');return (oSku&&sSku&&oSku!==sSku)?'同产品ID下其他SKU有备货':'备货在途';})(),
    '备货申请数量': stock?.['备货申请数量']??'—', '采购数量': stock?.['采购数量']??'—',
    '批次状态': stock?.['批次状态']??'—', '最新状态': stock?.['最新状态']??'无在途备货',
    '运输方式': stock?.['运输方式']??'—', '供应商': stock?.['供应商']??'—',
    '目标仓库': stock?.['目标仓库']??'—', '添加时间': stock?.['添加时间']??'—', '提交采购时间': stock?.['提交采购时间']??'—',
  };
}
const RESULT_COLS = ['订单编号','下架状态','改派标签','产品ID','品名','SKU','规格','物流渠道','识别国家','团队','店铺','支付时间','理论到货时间','申请批次号','备货线路','备货SKU','备货SKU名称','SKU匹配','备货申请数量','采购数量','批次状态','最新状态','运输方式','供应商','目标仓库','添加时间','提交采购时间'];
const COL_SETTINGS_KEY = 'col_settings';
let colOrder=[...RESULT_COLS], colVisible=Object.fromEntries(RESULT_COLS.map(c=>[c,true])), colFilters={}, colWidths=Object.fromEntries(RESULT_COLS.map(c=>[c,120]));
function loadColSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem(COL_SETTINGS_KEY)??'null');
    if (!saved) return;
    const savedCols = new Set(saved.order??[]);
    const merged = (saved.order??[]).filter(c=>RESULT_COLS.includes(c));
    RESULT_COLS.forEach(c=>{ if(!savedCols.has(c)) merged.push(c); });
    colOrder=merged; colVisible=Object.fromEntries(RESULT_COLS.map(c=>[c,saved.visible?.[c]??true])); colWidths=Object.fromEntries(RESULT_COLS.map(c=>[c,saved.widths?.[c]??120]));
  } catch {}
}
function saveColSettings() { localStorage.setItem(COL_SETTINGS_KEY, JSON.stringify({order:colOrder,visible:colVisible,widths:colWidths})); }
loadColSettings();
function getActiveCols() { return colOrder.filter(c=>colVisible[c]); }
function getFilteredRows() {
  const rows=window._queryResults??[], active=getActiveCols();
  return rows.filter(row=>active.every(col=>{ const f=(colFilters[col]??'').trim().toLowerCase(); return !f||String(row[col]??'').toLowerCase().includes(f); }));
}
function openColPanel() { document.getElementById('col-panel').style.display='flex'; renderColPanel(); }
function closeColPanel() { document.getElementById('col-panel').style.display='none'; }
function renderColPanel() {
  const list=document.getElementById('col-panel-list');
  list.innerHTML=colOrder.map((col,i)=>`<div class="col-item" draggable="true" data-col="${col}" data-idx="${i}"><span class="drag-handle">⠿</span><input type="checkbox" id="chk-${i}" ${colVisible[col]?'checked':''} onchange="colVisible['${col}']=this.checked;refreshTable();saveColSettings();"/><label for="chk-${i}" class="col-label">${col}</label><input type="number" class="col-width-input" value="${colWidths[col]??120}" min="40" max="600" title="列宽(px)" onchange="colWidths['${col}']=Math.max(40,+this.value||120);refreshTable();saveColSettings();"/><span class="col-width-unit">px</span></div>`).join('');
  let dragIdx=null;
  list.querySelectorAll('.col-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{ if(e.target.tagName==='INPUT'){e.preventDefault();return;} dragIdx=+el.dataset.idx;el.classList.add('dragging'); });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',()=>{ el.classList.remove('drag-over'); const toIdx=+el.dataset.idx; if(dragIdx===null||dragIdx===toIdx)return; const moved=colOrder.splice(dragIdx,1)[0]; colOrder.splice(toIdx,0,moved); refreshTable();saveColSettings();renderColPanel(); });
  });
}
function refreshTable() {
  const active=getActiveCols(), filtered=getFilteredRows();
  const thead=document.getElementById('result-thead'), tbody=document.getElementById('result-tbody');
  document.getElementById('result-count').textContent=filtered.length;
  thead.innerHTML=`<tr>${active.map(c=>`<th style="width:${colWidths[c]??120}px;min-width:${colWidths[c]??120}px;"><div class="th-inner"><span>${c}</span><span class="col-resizer" data-col="${c}"></span></div></th>`).join('')}</tr><tr class="filter-row">${active.map(c=>`<th style="width:${colWidths[c]??120}px;min-width:${colWidths[c]??120}px;"><input class="col-filter" placeholder="筛选…" value="${(colFilters[c]??'')}" oninput="colFilters['${c}']=this.value;refreshTable();"/></th>`).join('')}</tr>`;
  tbody.innerHTML=filtered.map(row=>'<tr>'+active.map(col=>{ let val=row[col]??''; if(col==='识别国家')val=`<span class="tag-country">${val}</span>`; if(col==='最新状态')val=`<span class="tag-status">${val}</span>`; if(col==='SKU匹配'&&val==='同产品ID下其他SKU有备货')val=`<span class="tag-warn">${val}</span>`; if(col==='SKU匹配'&&val==='备货在途')val=`<span class="tag-ok">${val}</span>`; return `<td style="width:${colWidths[col]??120}px;max-width:${colWidths[col]??120}px;" title="${String(row[col]??'').replace(/"/g,'&quot;')}">${val}</td>`; }).join('')+'</tr>').join('');
  thead.querySelectorAll('.col-resizer').forEach(resizer=>{
    resizer.addEventListener('mousedown',e=>{
      e.preventDefault(); const col=resizer.dataset.col, startX=e.clientX, startW=colWidths[col]??120;
      const onMove=mv=>{ colWidths[col]=Math.max(40,startW+mv.clientX-startX); const idx=active.indexOf(col); document.querySelectorAll('#result-table tr').forEach(tr=>{ const cell=tr.children[idx]; if(cell){cell.style.width=colWidths[col]+'px';cell.style.minWidth=colWidths[col]+'px';cell.style.maxWidth=colWidths[col]+'px';} }); if(document.getElementById('col-panel').style.display==='flex')renderColPanel(); };
      const onUp=()=>{ saveColSettings(); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
      document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
    });
  });
}
function renderResults(rows) {
  const section=document.getElementById('result-section'), noResult=document.getElementById('no-result');
  if(rows.length===0){section.style.display='none';noResult.style.display='block';return;}
  noResult.style.display='none'; section.style.display='block'; colFilters={}; window._queryResults=rows; refreshTable();
}
function exportXlsx() {
  const rows=getFilteredRows(); if(!rows?.length)return;
  const cols=getActiveCols(), ws=XLSX.utils.json_to_sheet(rows.map(r=>Object.fromEntries(cols.map(c=>[c,r[c]??'']))),{header:cols}), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'查询结果'); XLSX.writeFile(wb,`备货查询结果_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function exportCsv() {
  const rows=getFilteredRows(); if(!rows?.length)return;
  const cols=getActiveCols(), header=cols.join(','), body=rows.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+header+'\n'+body],{type:'text/csv;charset=utf-8'}), a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`备货查询结果_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}
document.getElementById('order-file').addEventListener('change',()=>handleFileUpload('order-file','order-status','order-upload-box','order'));
document.getElementById('stock-file').addEventListener('change',()=>handleFileUpload('stock-file','stock-status','stock-upload-box','stock'));
document.getElementById('btn-query').addEventListener('click',doQuery);
document.getElementById('btn-reset').addEventListener('click',()=>{ ['q-order-id','q-product-id','q-product-name','q-sku','q-country','q-team','q-shop','q-status'].forEach(id=>document.getElementById(id).value=''); document.getElementById('result-section').style.display='none'; document.getElementById('no-result').style.display='none'; });
document.getElementById('btn-export-xlsx').addEventListener('click',exportXlsx);
document.getElementById('btn-export-csv').addEventListener('click',exportCsv);
renderHistory('order'); renderHistory('stock');
  </script>
</body>
</html>
